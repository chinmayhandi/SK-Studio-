<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Sk Studio Gift</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 40px; }
    .contact-info-card { background: var(--bg-light); padding: 30px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); margin-bottom: 20px; border-left: 4px solid var(--primary-color); }
    .contact-info-card h4 { margin-bottom: 10px; color: var(--text-dark); font-size: 1.2rem; }
    .contact-info-card p { color: var(--text-muted); }
    .map-container { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); height: 100%; min-height: 400px; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header>
    <div class="container navbar">
      <div class="nav-left">
        <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        <div class="logo"><a href="index.html"><h1>Sk Studio <span>Gift</span></h1></a></div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero" style="height: 30vh; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1577048981591-628f80459c5a?auto=format&fit=crop&w=1920&q=80');">
    <div class="hero-content"><h2 style="margin:0;">Contact Us</h2></div>
  </section>

  <section class="container" style="padding: 80px 0;">
    <div class="contact-grid">
      <div>
        <div class="contact-info-card">
          <h4><i class="fas fa-map-marker-alt" style="color:var(--primary-color);"></i> Address</h4>
          <p>Sk Studio Gift, Near Renuka Medical, GVVS College Road, Nidagundi-586213, Karnataka</p>
        </div>
        
        <div class="contact-info-card">
          <h4><i class="fas fa-phone-alt" style="color:var(--primary-color);"></i> Phone & WhatsApp</h4>
          <p>+91 7090924592</p>
        </div>
        
        <div class="contact-info-card">
          <h4><i class="fas fa-share-alt" style="color:var(--primary-color);"></i> Social Media</h4>
          <p style="margin-top:10px;">
            <a href="https://www.instagram.com/sk_studio_gifts01?igsh=MThpdHVxa2ZpZGdzNQ%3D%3D" target="_blank" style="color:#E1306C; margin-right:20px; font-weight:600;"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://youtube.com/@Skstudio-jb3mg?si=tQig5l_9pRB_O5Yz" target="_blank" style="color:#FF0000; font-weight:600;"><i class="fab fa-youtube"></i> YouTube</a>
          </p>
        </div>
        
        <a href="https://wa.me/917090924592" class="btn-primary" target="_blank" style="width: 100%; text-align: center; margin-top: 20px; background:#25D366;">
          <i class="fab fa-whatsapp"></i> Message on WhatsApp
        </a>
      </div>
      
      <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1136.214041795325!2d75.9348234!3d16.3589753!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc797c19b334aab%3A0x96a2ba757354e461!2sSK%20STUDIO%20%26%20GIFTS!5e0!3m2!1sen!2sin!4v1714134981249!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col">
          <h3 style="color:var(--secondary-color); font-size:1.8rem;">Sk Studio Gift</h3>
          <p>Personalized Gifts Made With Love.</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
